<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthGuard - Quick Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0D0E11, #1C1F23);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #E24B4A;
            font-size: 2.5rem;
        }
        .test-card {
            background: #1A1D21;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .test-card h2 {
            margin-bottom: 1rem;
            color: #1D9E75;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sample-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            margin: 0.5rem;
            background: linear-gradient(135deg, #E24B4A, #C43B3A);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .sample-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(226, 75, 74, 0.4);
        }
        .sample-btn.real {
            background: linear-gradient(135deg, #1D9E75, #14865C);
        }
        .sample-btn.real:hover {
            box-shadow: 0 8px 25px rgba(29, 158, 117, 0.4);
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: #151719;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin: 1rem 0;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #E24B4A;
        }
        .analyze-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #E24B4A, #C43B3A);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(226, 75, 74, 0.4);
        }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #151719;
            border-radius: 8px;
            border-left: 4px solid #E24B4A;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.3s; }
        .result.fake { border-left-color: #E24B4A; }
        .result.real { border-left-color: #1D9E75; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .verdict {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .verdict.fake { color: #E24B4A; }
        .verdict.real { color: #1D9E75; }
        .confidence {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 1rem;
        }
        .analysis-list {
            list-style: none;
            padding: 0;
        }
        .analysis-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .analysis-list li:last-child { border-bottom: none; }
        .status {
            text-align: center;
            padding: 1rem;
            background: #1D9E75;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .status.error { background: #E24B4A; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ TruthGuard - Quick Test</h1>
        
        <div id="status" class="status">
            Loading...
        </div>

        <div class="test-card">
            <h2>📝 Sample Test Cases</h2>
            <p style="margin-bottom: 1rem; color: #A1A7B3;">Click to load sample news:</p>
            <button class="sample-btn" onclick="loadSample('fake1')">🚨 Fake Headline 1</button>
            <button class="sample-btn" onclick="loadSample('fake2')">🚨 Fake Headline 2</button>
            <button class="sample-btn real" onclick="loadSample('real1')">✅ Real Headline 1</button>
            <button class="sample-btn real" onclick="loadSample('real2')">✅ Real Headline 2</button>
        </div>

        <div class="test-card">
            <h2>🔍 Analyze News</h2>
            <textarea id="newsText" placeholder="Paste news content here or click a sample above..."></textarea>
            <button class="analyze-btn" onclick="analyze()">
                Analyze with AI
            </button>
        </div>

        <div id="result" class="result">
            <div class="verdict" id="verdict">Verdict</div>
            <div class="confidence" id="confidence">0%</div>
            <h3 style="margin-bottom: 1rem;">Analysis Details:</h3>
            <ul class="analysis-list" id="analysisList"></ul>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const samples = {
            fake1: 'BREAKING: Scientists DISCOVER Secret Cure That Big Pharma DOESN\'T Want You To Know About! You WON\'T BELIEVE This MIRACLE Treatment!',
            fake2: 'SHOCKING: Government CONSPIRACY Finally Exposed - They\'ve Been Lying To Us For YEARS! This ONE Simple Trick Will Change EVERYTHING!',
            real1: 'The Federal Reserve announced today that interest rates will remain unchanged through the first quarter of next year, citing stable economic indicators.',
            real2: 'Scientists published a peer-reviewed study on climate change in Nature journal, analyzing temperature data from the past century.'
        };

        function loadSample(type) {
            document.getElementById('newsText').value = samples[type];
        }

        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                const statusEl = document.getElementById('status');
                if (data.status === 'ok') {
                    statusEl.innerHTML = '✅ Server Connected - ML Model: ' + (data.modelLoaded ? 'Loaded' : 'Fallback');
                    statusEl.className = 'status';
                } else {
                    throw new Error('Server not ready');
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Server not connected. Please start the backend server.';
                document.getElementById('status').className = 'status error';
            }
        }

        async function analyze() {
            const text = document.getElementById('newsText').value.trim();
            if (!text) {
                alert('Please enter some text to analyze');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/demo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                displayResult(data);
            } catch (error) {
                alert('Error connecting to server. Make sure the backend is running.');
            }
        }

        function displayResult(data) {
            const resultEl = document.getElementById('result');
            const verdictEl = document.getElementById('verdict');
            const confidenceEl = document.getElementById('confidence');
            const listEl = document.getElementById('analysisList');

            if (data.isFake) {
                verdictEl.textContent = '🚨 FAKE NEWS DETECTED';
                verdictEl.className = 'verdict fake';
                resultEl.className = 'result show fake';
            } else {
                verdictEl.textContent = '✅ LIKELY REAL NEWS';
                verdictEl.className = 'verdict real';
                resultEl.className = 'result show real';
            }

            confidenceEl.textContent = data.confidence + '% Confidence';
            listEl.innerHTML = data.analysis.map(item => `<li>• ${item}</li>`).join('');
        }

        // Check server status on load
        checkHealth();
    </script>
</body>
</html>
